<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монолит</title>
    <style>
        body { background: black; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: monospace; font-size: 24px; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="status">Загрузка...</div>
    <script>
        // Скрипт будет раз в 5 секунд проверять обновление статуса
        setInterval(() => {
            fetch('/status.txt').then(r => r.text()).then(text => {
                document.getElementById('status').innerText = text;
            });
        }, 5000);
    </script>
</body>
</html>
